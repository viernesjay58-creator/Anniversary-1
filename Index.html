<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Kimberly ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SLOW BURN START -->
<div id="intro" class="screen active">
  <h2>Something special is loading for Kimberly...</h2>
</div>

<!-- LOCK SCREEN -->
<div id="lock" class="screen">
  <div class="card">
    <h2>Enter the special date ❤️</h2>
    <input type="text" id="dateInput" placeholder="MM/DD/YYYY">
    <button onclick="checkDate()">Unlock</button>
    <p id="error"></p>
  </div>
</div>

<!-- MAIN -->
<div id="main" class="screen">

  <h1>Hi Kimberly Padilla ❤️</h1>
  <p>I made something for you...</p>

  <button onclick="startMessages()">Click Me</button>

  <div id="messages"></div>

  <div id="final" class="hidden">
    <h2>Happy Anniversary ❤️</h2>
    <p>From Jay-Ar Viernes 💌</p>

    <button onclick="secretTap()">Tap me 😏</button>
    <p id="secret"></p>
  </div>

</div>

<div id="overlay">
  <p>No matter what happens...<br>I will always choose you. ❤️</p>
</div>

<script src="script.js"></script>
</body>
</html>
