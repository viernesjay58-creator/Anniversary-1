<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Kimberly ❤️</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  text-align:center;
  overflow-x:hidden;
  background:linear-gradient(135deg,#ffd1dc,#fff);
}

/* HEARTBEAT BACKGROUND */
body::before{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:radial-gradient(circle,rgba(255,182,193,0.6),transparent);
  animation:pulse 6s infinite;
  z-index:-1;
}

@keyframes pulse{
  0%{transform:scale(1);opacity:0.4;}
  50%{transform:scale(1.1);opacity:0.6;}
  100%{transform:scale(1);opacity:0.4;}
}

.screen{display:none;padding:40px;}
.active{display:block;}

.card{
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:20px;
  display:inline-block;
}

input{
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

button{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
}

button:hover{transform:scale(1.05);}

.shake{animation:shake 0.3s;}

@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(-5px);}
  50%{transform:translateX(5px);}
  75%{transform:translateX(-5px);}
  100%{transform:translateX(0);}
}

#overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  color:white;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:20px;
  padding:20px;
}

.heart{
  position:fixed;
  color:red;
  animation:float 4s linear forwards;
}

@keyframes float{
  from{transform:translateY(100vh);opacity:1;}
  to{transform:translateY(-10vh);opacity:0;}
}
</style>
</head>

<body>

<div id="intro" class="screen active">
  <h3>Something special is loading for Kimberly...</h3>
</div>

<div id="lock" class="screen">
  <div class="card">
    <h3>Enter the special date ❤️</h3>
    <input id="date" placeholder="MM/DD/YYYY">
    <br>
    <button onclick="check()">Unlock</button>
    <p id="err"></p>
  </div>
</div>

<div id="main" class="screen">
  <h1>Hi Kimberly Padilla ❤️</h1>
  <p>I made something for you...</p>
  <button onclick="start()">Click Me</button>

  <div id="msg"></div>

  <div id="final" style="display:none;">
    <h2>Happy Anniversary ❤️</h2>
    <p>From Jay-Ar Viernes 💌</p>

    <button onclick="tap()">Tap me 😏</button>
    <p id="secret"></p>
  </div>
</div>

<div id="overlay">
No matter what happens...<br>
I will always choose you. ❤️
</div>

<script>
setTimeout(()=>{
  intro.classList.remove("active");
  lock.classList.add("active");
},3000);

function check(){
  let val=document.getElementById("date").value;
  if(val==="04/19/2025"){
    lock.classList.remove("active");
    main.classList.add("active");
  }else{
    err.innerText="Think of a special day ❤️";
    lock.classList.add("shake");
    setTimeout(()=>lock.classList.remove("shake"),300);
  }
}

const msgs=[
  "From the day I met you...",
  "Everything felt different...",
  "You became my favorite person..."
];

function start(){
  let i=0;
  function show(){
    if(i<msgs.length){
      msg.innerText=msgs[i];
      i++;
      setTimeout(show,2000);
    }else{
      final.style.display="block";
    }
  }
  show();
}

let t=0;
function tap(){
  t++;
  if(t>=5){
    secret.innerText="Ikaw at ikaw lang ❤️";
  }
}

let c=0;
document.body.addEventListener("click",()=>{
  c++;

  let h=document.createElement("div");
  h.className="heart";
  h.innerText="❤️";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),4000);

  if(c>=10){
    overlay.style.display="flex";
  }
});
</script>

</body>
</html>
